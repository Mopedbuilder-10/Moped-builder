<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Moped Builder</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }
    .container {
      margin-top: 40px;
    }
    select, input {
      padding: 10px;
      margin: 10px;
      font-size: 16px;
    }
    .bike {
      margin-top: 20px;
    }
    .result {
      margin-top: 20px;
      font-size: 20px;
    }
  </style>
</head>
<body>

<h1>🔥 Build Your Moped 🔥</h1>

<div class="container">

  <h2>1. Välj moppe</h2>
  <select id="moped">
    <option value="Rieju MRT">Rieju MRT</option>
    <option value="Derbi Senda">Derbi Senda</option>
  </select>

  <h2>2. Välj färg</h2>
  <input type="color" id="color">

  <h2>3. Välj delar</h2>

  <label>Avgas (kr):</label>
  <input type="number" id="exhaust" value="0">

  <label>Styre (kr):</label>
  <input type="number" id="handlebar" value="0">

  <label>Höjning (kr):</label>
  <input type="number" id="lift" value="0">

  <br><br>
  <button onclick="calculate()">Räkna pris</button>

  <div class="result" id="result"></div>

</div>

<script>
function calculate() {
  let exhaust = parseInt(document.getElementById("exhaust").value) || 0;
  let handlebar = parseInt(document.getElementById("handlebar").value) || 0;
  let lift = parseInt(document.getElementById("lift").value) || 0;

  let total = exhaust + handlebar + lift;

  document.getElementById("result").innerHTML =
    "💰 Totalt pris: " + total + " kr";
}
</script>

</body>
</html>
